name: Test, Build & Push

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Default to minimal permissions (principle of least privilege)
# Individual jobs can request additional permissions as needed
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  EMAIL_DOMAINS: "example.com,mail.example.com"
  CONFIG_EMAIL_EXPIRATIONTIME: "1800"
  CONFIG_EMAIL_EXTENSIONTIME: "900"
  CONFIG_API_URL: "/api"
  CONFIG_API_TIMEOUT: "5000"

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run frontend tests with coverage
      run: npm test -- --coverage
      env:
        CI: true
    
    - name: Upload frontend test coverage
      uses: actions/upload-artifact@v5
      with:
        name: frontend-coverage
        path: coverage/
        retention-days: 7
        
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend
        
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
      
    - name: Run backend tests with coverage
      run: npm run test:ci
      env:
        CI: true
        NODE_ENV: test
        EMAIL_DOMAINS: test.com,test.org
    
    - name: Upload backend test coverage
      uses: actions/upload-artifact@v5
      with:
        name: backend-coverage
        path: backend/coverage/
        retention-days: 7

  build-and-push:
    name: Build and Push Containers
    needs: [frontend-tests, backend-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      frontend_digest: ${{ steps.push-frontend.outputs.digest }}
      backend_digest: ${{ steps.push-backend.outputs.digest }}
      image_sha_tag: sha-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only login if we're going to push (main branch or tags)
      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Frontend Docker metadata
        id: meta-frontend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push Frontend Docker image
        id: push-frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            EMAIL_DOMAINS=${{ env.EMAIL_DOMAINS }}
            CONFIG_EMAIL_EXPIRATIONTIME=${{ env.CONFIG_EMAIL_EXPIRATIONTIME }}
            CONFIG_EMAIL_EXTENSIONTIME=${{ env.CONFIG_EMAIL_EXTENSIONTIME }}
            CONFIG_API_URL=${{ env.CONFIG_API_URL }}
            CONFIG_API_TIMEOUT=${{ env.CONFIG_API_TIMEOUT }}
            NODE_ENV=production

      - name: Extract Backend Docker metadata
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push Backend Docker image
        id: push-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # Prod compose pulls :latest from GHCR. This job is the CI signal that those
  # images were published for this commit. It does not SSH into the host —
  # the server must pull/restart (manual or Watchtower) to run them.
  publish-ready:
    name: Production Images Ready
    needs: [build-and-push]
    if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Confirm published production tags
        env:
          FRONTEND_DIGEST: ${{ needs.build-and-push.outputs.frontend_digest }}
          BACKEND_DIGEST: ${{ needs.build-and-push.outputs.backend_digest }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend"
          BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend"
          SHA_TAG="sha-${SHORT_SHA:0:7}"

          if [ -z "${FRONTEND_DIGEST}" ] || [ -z "${BACKEND_DIGEST}" ]; then
            echo "::error::Missing image digests from build-and-push — images were not published."
            exit 1
          fi

          echo "Published for commit ${SHORT_SHA}"
          echo "  ${FRONTEND_IMAGE}:latest @ ${FRONTEND_DIGEST}"
          echo "  ${FRONTEND_IMAGE}:${SHA_TAG} @ ${FRONTEND_DIGEST}"
          echo "  ${BACKEND_IMAGE}:latest @ ${BACKEND_DIGEST}"
          echo "  ${BACKEND_IMAGE}:${SHA_TAG} @ ${BACKEND_DIGEST}"
          echo ""
          echo "docker-compose.yml on prod uses these :latest tags."
          echo "CI does not restart the host; pull/restart there to run this build."
